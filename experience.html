<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作经历 — 卡力</title>
<meta name="description" content="卡力的工作经历与职业发展">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FFFFFF;
  --bg-subtle: #FAFAFA;
  --text-primary: #1A1A1A;
  --text-secondary: #555555;
  --text-tertiary: #999999;
  --text-quaternary: #CCCCCC;
  --border: #E5E5E5;
  --border-light: #F0F0F0;
  --accent: #00E676;
  --accent-dim: #00C853;
  --accent-soft: rgba(0, 230, 118, 0.06);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 40px;
  --space-2xl: 64px;
  --space-3xl: 96px;
  --radius: 2px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --dur: 200ms;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
::selection { background: var(--accent); color: var(--bg); }

.bg-grid {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  background-image:
    linear-gradient(rgba(0,230,118,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,230,118,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* 导航 */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
}
.nav-inner {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 var(--space-lg);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}
.nav-logo .dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}
.nav-back {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-tertiary);
  transition: color var(--dur) var(--ease);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}
.nav-back:hover { color: var(--accent); }

/* 主体 */
.main {
  max-width: 800px;
  margin: 0 auto;
  padding: 100px var(--space-lg) var(--space-3xl);
}

/* 标题区 */
.page-header {
  margin-bottom: var(--space-2xl);
}
.page-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-md);
}
.page-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 4vw, 44px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}
.page-title .accent { color: var(--accent); }
.page-subtitle {
  font-size: 16px;
  color: var(--text-secondary);
  margin-top: var(--space-md);
  max-width: 500px;
  line-height: 1.7;
}

/* 待填充提示 */
.placeholder-card {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: var(--space-3xl) var(--space-xl);
  text-align: center;
  background: var(--bg-subtle);
}
.placeholder-icon {
  width: 48px; height: 48px;
  margin: 0 auto var(--space-lg);
  opacity: 0.3;
}
.placeholder-icon svg {
  width: 100%; height: 100%;
  stroke: var(--text-tertiary);
  stroke-width: 1.5;
  fill: none;
}
.placeholder-text {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: var(--space-sm);
}
.placeholder-hint {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-tertiary);
}

/* 终端光标 */
.cursor {
  display: inline-block;
  width: 3px;
  height: 0.85em;
  background: var(--accent);
  margin-left: 2px;
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* 动画 */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 500ms var(--ease), transform 500ms var(--ease);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* 页脚 */
.footer {
  max-width: 800px;
  margin: 0 auto;
  padding: var(--space-xl) var(--space-lg);
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}
.footer-links { display: flex; gap: var(--space-md); }
.footer-links a { transition: color var(--dur) var(--ease); }
.footer-links a:hover { color: var(--accent); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 640px) {
  .main { padding: 80px var(--space-md) var(--space-2xl); }
  .footer { flex-direction: column; gap: var(--space-md); text-align: center; }
  .placeholder-card { padding: var(--space-2xl) var(--space-lg); }
}
</style>
</head>
<body>

<div class="bg-grid"></div>

<!-- 导航 -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">
      <span class="dot"></span>
      <span>kali@superkali:~$</span>
    </div>
    <a class="nav-back" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
      <span>返回主页</span>
    </a>
  </div>
</nav>

<!-- 主体 -->
<main class="main">
  <div class="page-header reveal">
    <div class="page-label">work_experience</div>
    <h1 class="page-title">工作经历<span class="accent">.</span><span class="cursor"></span></h1>
    <p class="page-subtitle">完整的职业发展路径与工作经历详情。</p>
  </div>

  <div class="placeholder-card reveal">
    <div class="placeholder-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="13" y2="15"/></svg>
    </div>
    <div class="placeholder-text">内容整理中</div>
    <div class="placeholder-hint">简历内容将在此处展示</div>
  </div>
</main>

<!-- 页脚 -->
<footer class="footer">
  <div>© 2026 卡力 — 精准构建</div>
  <div class="footer-links">
    <a href="index.html">返回主页</a>
    <a href="https://github.com/kali-artist" target="_blank">GitHub</a>
    <a href="mailto:kali@superkali.online">邮箱</a>
  </div>
</footer>

<script>
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
</script>

</body>
</html>
